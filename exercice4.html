<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercice 4 — Coordination &amp; Juxtaposition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0f0e17;
    --card:    #1a1828;
    --accent1: #ff6b35;
    --accent2: #7c6af7;
    --accent3: #2ec4b6;
    --gold:    #f4a261;
    --lime:    #06d6a0;
    --text:    #fffffe;
    --muted:   #a7a9be;
    --success: #2ec4b6;
    --error:   #ff4d6d;
    --border:  #2a2840;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse at 20% 15%, rgba(244,162,97,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(6,214,160,0.07) 0%, transparent 55%);
  }

  /* ── HEADER ───────────────────────────────────────── */
  header { text-align: center; margin-bottom: 2.5rem; }

  .back-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
    color: var(--muted); text-decoration: none; margin-bottom: 1.2rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--lime));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  header p { color: var(--muted); margin-top: 0.5rem; font-size: 1rem; }

  /* ── CONTAINER ────────────────────────────────────── */
  .container { max-width: 700px; margin: 0 auto; }

  /* ── AUTH SCREEN ──────────────────────────────────── */
  .auth-screen {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    animation: slideIn 0.4s ease;
    position: relative; overflow: hidden;
  }
  .auth-screen::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--lime));
  }
  .auth-screen h2 {
    font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 0.4rem;
  }
  .auth-screen > p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

  .field-group { margin-bottom: 1.2rem; }
  .field-group label {
    display: block;
    font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.5rem;
  }
  .field-group input, .field-group select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 0.75rem 1rem; outline: none;
    transition: border-color 0.2s; appearance: none;
  }
  .field-group input:focus, .field-group select:focus {
    border-color: var(--gold); background: rgba(244,162,97,0.07);
  }
  .field-group input::placeholder { color: #555; }
  .field-group select option { background: #1a1828; }

  .btn { display: block; width: 100%; margin-top: 1.5rem; padding: 0.9rem; border: none; border-radius: 12px; color: white; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s, transform 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--gold), var(--lime)); }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }

  .auth-error {
    margin-top: 0.8rem; padding: 0.7rem 1rem;
    background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
    border-radius: 10px; color: var(--error); font-size: 0.9rem; display: none;
  }

  /* ── QUIZ SCREEN ──────────────────────────────────── */
  #quiz-screen { display: none; }

  .score-bar {
    display: flex; justify-content: center; gap: 1.2rem; margin-bottom: 1.5rem;
  }
  .score-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.35rem 1.1rem;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
  }
  .score-pill span { color: var(--gold); }

  .progress-bar {
    height: 4px; background: var(--border); border-radius: 999px;
    margin-bottom: 1.8rem; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--lime));
    border-radius: 999px; transition: width 0.4s ease;
  }

  /* ── QUESTION CARD ────────────────────────────────── */
  .q-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem;
    animation: slideIn 0.35s ease; position: relative; overflow: hidden;
  }
  .q-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--lime));
  }

  .q-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-badge {
    display: inline-block; font-family: 'Syne', sans-serif;
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 0.22rem 0.7rem; border-radius: 4px;
  }
  .badge-coord  { background: rgba(244,162,97,0.15);  color: var(--gold); border: 1px solid rgba(244,162,97,0.3); }
  .badge-phrase { background: rgba(6,214,160,0.12);   color: var(--lime); border: 1px solid rgba(6,214,160,0.3); }

  .q-counter {
    font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
  }

  .q-text {
    font-size: 1.05rem; font-weight: 500; margin-bottom: 1.4rem; line-height: 1.55;
  }
  .q-phrase {
    font-style: italic; margin: 0.6rem 0 1.4rem;
    padding: 0.85rem 1.1rem;
    background: rgba(244,162,97,0.08);
    border-left: 3px solid var(--gold);
    border-radius: 0 10px 10px 0;
    font-size: 1.1rem; line-height: 1.5;
  }

  /* ── MCQ OPTIONS ──────────────────────────────────── */
  .mcq-options { display: flex; flex-direction: column; gap: 0.55rem; margin-bottom: 1.2rem; }
  .mcq-option  { display: none; }
  .mcq-option + .mcq-opt-label {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.8rem 1rem; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.03);
    cursor: pointer; transition: all 0.2s; font-size: 0.95rem; line-height: 1.45;
  }
  .mcq-option + .mcq-opt-label:hover {
    border-color: rgba(244,162,97,0.4); background: rgba(244,162,97,0.07);
  }
  .mcq-option:checked + .mcq-opt-label {
    background: rgba(244,162,97,0.14); border-color: var(--gold);
    color: var(--gold); font-weight: 600;
  }
  .opt-letter {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.85rem;
    width: 22px; flex-shrink: 0; padding-top: 0.05rem;
  }
  .mcq-opt-label.was-correct  { background: rgba(46,196,182,0.12)!important; border-color: var(--success)!important; color: var(--success)!important; }
  .mcq-opt-label.was-wrong    { background: rgba(255,77,109,0.1)!important;  border-color: var(--error)!important;   color: var(--error)!important;   }
  .mcq-opt-label.correct-ans  { border-color: var(--success)!important; color: var(--success)!important; border-style: dashed!important; }

  .mcq-explanation {
    margin-top: 0.9rem; padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.04);
    border-left: 3px solid var(--lime);
    border-radius: 0 8px 8px 0;
    font-size: 0.87rem; color: var(--muted); line-height: 1.55;
    animation: slideIn 0.3s ease;
  }
  .mcq-explanation strong { color: var(--lime); }

  /* ── BUTTONS ──────────────────────────────────────── */
  .validate-btn {
    display: block; width: 100%; padding: 0.85rem;
    background: linear-gradient(135deg, var(--gold), var(--lime));
    border: none; border-radius: 12px; color: #0f0e17;
    font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.2s, transform 0.2s;
  }
  .validate-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .validate-btn:disabled { opacity: 0.35; cursor: default; }

  .next-btn {
    display: none; width: 100%; margin-top: 0.7rem; padding: 0.85rem;
    background: var(--card); border: 1.5px solid var(--accent3);
    border-radius: 12px; color: var(--accent3);
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s;
  }
  .next-btn:hover { background: rgba(46,196,182,0.1); }
  .next-btn.show  { display: block; animation: fadeIn 0.3s ease; }

  /* ── RESULTS ──────────────────────────────────────── */
  #results-screen { display: none; }

  .results-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem; animation: slideIn 0.4s ease;
  }
  .big-score {
    font-family: 'Syne', sans-serif; font-size: 4.5rem; font-weight: 800;
    line-height: 1; text-align: center;
  }
  .big-score .denom { font-size: 2.2rem; color: var(--muted); }
  .result-title  { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; text-align: center; margin: 0.5rem 0; }
  .score-quote   { color: var(--muted); font-style: italic; text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem; }

  .section-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .sscore-card    { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
  .sscore-label   { font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.4rem; }
  .sscore-val     { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }

  .review-section { margin-top: 1.5rem; }
  .review-section h3 { font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
  .review-item    { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.8rem 1rem; margin-bottom: 0.5rem; font-size: 0.85rem; border: 1px solid var(--border); }
  .ri-q   { display: block; margin-bottom: 0.3rem; color: var(--text); }
  .ri-sub { color: var(--muted); font-size: 0.78rem; }
  .ri-ok  { border-color: rgba(46,196,182,0.3); }
  .ri-no  { border-color: rgba(255,77,109,0.3); }

  .home-btn {
    display: block; text-align: center; margin-top: 1rem; padding: 0.75rem;
    border-radius: 10px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); color: var(--muted);
    text-decoration: none; font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700; transition: all 0.2s;
  }
  .home-btn:hover { border-color: var(--gold); color: var(--gold); }

  #sending-status { display: none; }

  /* ── ANIMATIONS ───────────────────────────────────── */
  @keyframes slideIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
</style>

<header>
  <a class="back-link" href="index.html">← Retour aux exercices</a>
  <h1>Exercice 4</h1>
  <p>Coordination, juxtaposition &amp; révision — Préparation à l'examen</p>
</header>

<div class="container">

  <!-- AUTH -->
  <div class="auth-screen" id="auth-screen">
    <h2>Identification</h2>
    <p>Entre tes informations avant de commencer l'exercice.</p>
    <div class="field-group">
      <label>Prénom</label>
      <input type="text" id="f-prenom" placeholder="Ton prénom" autocomplete="given-name">
    </div>
    <div class="field-group">
      <label>Nom</label>
      <input type="text" id="f-nom" placeholder="Ton nom de famille" autocomplete="family-name">
    </div>
    <div class="field-group">
      <label>Groupe</label>
      <select id="f-groupe">
        <option value="">— Choisis ton groupe —</option>
        <option>Groupe 31</option>
        <option>Groupe 32</option>
        <option>Groupe 33</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Commencer l'exercice →</button>
    <div class="auth-error" id="auth-error">Remplis tous les champs avant de continuer.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="score-bar">
      <div class="score-pill">Question <span id="q-num">1</span> / 20</div>
      <div class="score-pill">Score : <span id="score-display">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-area"></div>
  </div>

  <!-- RESULTS -->
  <div id="results-screen"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// APPS SCRIPT
// ─────────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBtPFdoNA6udshPhdMkKIdrB4pZdtbujyrsz1-3sp0GQBfl51Y0Dyi3b6nwPVzFQ/exec";

// ─────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────
const QUESTIONS = [

  // ── SECTION 1 : Coordination & Juxtaposition (12 questions) ──────

  {
    section: 'coord',
    q: "La coordination consiste à joindre des éléments syntaxiques à l'aide :",
    opts: [
      "d'une virgule",
      "d'un coordonnant",
      "d'un subordonnant",
      "d'un signe de ponctuation quelconque"
    ],
    ans: 1,
    expl: "<strong>La coordination</strong> utilise un <strong>coordonnant</strong> (conjonction de coordination comme <em>mais, ou, et, donc, car, ni, or</em> ou adverbe de relation comme <em>alors, puis, ensuite</em>). C'est la juxtaposition qui utilise un signe de ponctuation."
  },

  {
    section: 'coord',
    q: "La juxtaposition relie des éléments à l'aide :",
    opts: [
      "du coordonnant et",
      "d'un adverbe de relation comme alors",
      "d'un signe de ponctuation, le plus souvent la virgule",
      "d'un subordonnant comme lorsque"
    ],
    ans: 2,
    expl: "<strong>La juxtaposition</strong> n'utilise pas de coordonnant : elle relie les éléments uniquement par la ponctuation (le plus souvent la <strong>virgule</strong>). Ex. : <em>À la maison, à l'école, la fatigue peut avoir des conséquences.</em>"
  },

  {
    section: 'coord',
    q: "Laquelle de ces affirmations sur la ponctuation est VRAIE ?",
    opts: [
      "On place une virgule devant le coordonnant et.",
      "On place une virgule devant les coordonnants et, ni et ou.",
      "On place une virgule devant tous les coordonnants, sauf et, ni et ou.",
      "On ne place jamais de virgule devant un coordonnant."
    ],
    ans: 2,
    expl: "La règle : on place une <strong>virgule devant tous les coordonnants, sauf et, ni et ou</strong>. Ex. : <em>Elle est fatiguée, mais elle continue.</em> — <em>Il mange et il dort.</em> (pas de virgule avant et)."
  },

  {
    section: 'coord',
    q: "Dans quelle phrase les éléments sont-ils JUXTAPOSÉS (et non coordonnés) ?",
    opts: [
      "Il mange et il dort beaucoup.",
      "Elle est fatiguée, mais elle travaille quand même.",
      "Il fait chaud dehors, je reste à l'intérieur.",
      "Étudie ton français, sinon tu vas échouer."
    ],
    ans: 2,
    expl: "Dans c), deux phrases syntaxiques sont reliées uniquement par une <strong>virgule, sans coordonnant</strong> : c'est la <strong>juxtaposition</strong>. Les phrases a), b) et d) contiennent un coordonnant (et, mais, sinon)."
  },

  {
    section: 'coord',
    q: "Dans quelle phrase les éléments sont-ils COORDONNÉS ?",
    opts: [
      "Elle range ses affaires, elle prend son manteau.",
      "Stressé, épuisé, il ne pouvait plus se concentrer.",
      "Il prend le bus, le métro ou sa voiture selon l'heure.",
      "À l'école, au travail, la ponctualité est essentielle."
    ],
    ans: 2,
    expl: "Dans c), le <strong>coordonnant ou</strong> relie des éléments : c'est la coordination. Dans a) et b), les éléments sont séparés par des virgules seulement (juxtaposition). Dans d), les groupes prépositionnels sont juxtaposés."
  },

  {
    section: 'coord',
    phrase: "Il réussit bien, <strong>car</strong> il travaille fort.",
    q: "Quelle est la valeur du coordonnant car dans cette phrase ?",
    opts: ["Opposition", "Conséquence", "Cause", "Addition"],
    ans: 2,
    expl: "<strong>Car</strong> exprime la <strong>cause</strong> : le fait de travailler fort est la raison (cause) de la réussite. D'autres coordonnants de cause : <em>parce que, puisque, en effet, en raison de</em>…"
  },

  {
    section: 'coord',
    phrase: "Elle est malade, <strong>donc</strong> elle reste à la maison.",
    q: "Quelle est la valeur du coordonnant donc dans cette phrase ?",
    opts: ["Cause", "Conséquence", "Opposition", "Succession"],
    ans: 1,
    expl: "<strong>Donc</strong> exprime la <strong>conséquence</strong> : rester à la maison est le résultat (conséquence) d'être malade. D'autres coordonnants de conséquence : <em>ainsi, alors, par conséquent, en conséquence</em>…"
  },

  {
    section: 'coord',
    phrase: "Il a bien étudié, <strong>puis</strong> il a dormi profondément.",
    q: "Quelle est la valeur du coordonnant puis dans cette phrase ?",
    opts: ["Addition", "Opposition", "Cause", "Succession"],
    ans: 3,
    expl: "<strong>Puis</strong> exprime la <strong>succession</strong> : les actions se déroulent l'une après l'autre dans le temps. D'autres coordonnants de succession : <em>alors, ensuite, enfin, et</em>…"
  },

  {
    section: 'coord',
    q: "Laquelle de ces phrases contient une erreur de PONCTUATION liée à la coordination ?",
    opts: [
      "« Il est stressé, car il a un examen demain. »",
      "« Elle mange sainement et elle dort bien. »",
      "« Le yoga la méditation et la marche l'aident à se détendre. »",
      "« Il voulait venir, mais il était trop fatigué. »"
    ],
    ans: 2,
    expl: "Dans c), il manque une virgule après <em>yoga</em> pour juxtaposer les éléments de l'énumération. Correction : <em>« Le yoga, la méditation et la marche l'aident à se détendre. »</em>"
  },

  {
    section: 'coord',
    q: "Laquelle de ces phrases contient un COORDONNANT EN TROP ?",
    opts: [
      "« Il était épuisé, donc il a décidé de se reposer. »",
      "« Elle a réussi son examen et elle était très contente. »",
      "« Il a donc par conséquent annulé son entraînement. »",
      "« Tu peux venir ou rester à la maison. »"
    ],
    ans: 2,
    expl: "Dans c), <em>donc</em> et <em>par conséquent</em> expriment tous deux la <strong>conséquence</strong> : un seul suffit. On dit qu'il y a un <strong>coordonnant en trop</strong>. Correction : <em>« Il a donc annulé son entraînement. »</em>"
  },

  {
    section: 'coord',
    q: "Dans quelle phrase le coordonnant est-il MAL CHOISI par rapport au sens ?",
    opts: [
      "« Elle travaille fort, donc elle réussit bien. »",
      "« Il était malade, car il a raté l'examen. »",
      "« Je n'aime ni le café ni le thé. »",
      "« Il a mangé, puis il s'est brossé les dents. »"
    ],
    ans: 1,
    expl: "Dans b), la logique est inversée : c'est parce qu'il était malade qu'il a raté l'examen — pas l'inverse. La <strong>valeur de car est la cause</strong>, mais ici la cause et la conséquence sont à l'envers. Correction : <em>« Il a raté l'examen, car il était malade. »</em>"
  },

  {
    section: 'coord',
    q: "Dans une énumération de plus de deux éléments (ex. : pomme, poire et raisin), comment les éléments sont-ils reliés ?",
    opts: [
      "Tous les éléments sont coordonnés (reliés par et).",
      "Tous les éléments sont juxtaposés (séparés par des virgules).",
      "Les premiers éléments sont juxtaposés et les deux derniers sont coordonnés.",
      "Le premier élément est coordonné et les suivants sont juxtaposés."
    ],
    ans: 2,
    expl: "Ex. : <em>pomme, poire et raisin</em> → <em>pomme</em> et <em>poire</em> sont <strong>juxtaposés</strong> (virgule) ; <em>poire</em> et <em>raisin</em> sont <strong>coordonnés</strong> (et). Les <strong>deux derniers</strong> sont toujours coordonnés."
  },

  // ── SECTION 2 : Types & Formes de phrases (8 questions) ──────────

  {
    section: 'phrase',
    phrase: "Rends-moi mon stylo.",
    q: "Quel est le TYPE de cette phrase ?",
    opts: ["Déclaratif", "Interrogatif", "Impératif", "Exclamatif"],
    ans: 2,
    expl: "La phrase <strong>impérative</strong> exprime un ordre ou une demande. Elle n'a généralement pas de sujet exprimé et se termine par un point (ou un point d'exclamation si la demande est intense)."
  },

  {
    section: 'phrase',
    phrase: "Comme tu joues bien de la guitare !",
    q: "Quel est le TYPE de cette phrase ?",
    opts: ["Déclaratif", "Exclamatif", "Impératif", "Interrogatif"],
    ans: 1,
    expl: "La phrase <strong>exclamative</strong> exprime une émotion ou une appréciation vive. Elle se termine par un <strong>point d'exclamation</strong>. Elle est souvent introduite par <em>que, comme, quel</em>…"

  {
    section: 'phrase',

  {

  {

    ans: 3,
    expl: "La forme <strong>emphatique</strong> met un élément en évidence à l'aide de <strong>c'est… qui / que</strong>. Ici, <em>c'est… qui</em> met en évidence le sujet. Autre exemple : <em>Lui, il a réussi.</em>"
  },

  {
    section: 'phrase',
    phrase: "Il est important de bien dormir chaque nuit.",
    q: "Cette phrase est de forme :",

    ans: 2,
    expl: "La forme <strong>impersonnelle</strong> a pour sujet <em>il</em> sans référent réel (ce <em>il</em> ne désigne pas une personne précise). Ex. : <em>Il faut, il pleut, il est interdit de…</em>"
  },

  {
    section: 'phrase',
    phrase: "Elle lui a demandé s'il voulait un café.",

      "Une interrogative indirecte",

      "Une phrase impérative"
    ],
    ans: 1,

  },

  {
    section: 'phrase',
    q: "Laquelle de ces phrases est une interrogative DIRECTE ?",
    opts: [
      "« Elle voulait savoir si tu allais au match. »",

      "« Je me demande où il est allé. »"
    ],
    ans: 2,
    expl: "L'<strong>interrogative directe</strong> pose la question directement, avec <strong>inversion du sujet-verbe ou est-ce que</strong>, et se termine par un <strong>point d'interrogation</strong>. Les phrases a), b) et d) sont des interrogatives indirectes (enchâssées dans une phrase principale)."
  }

];

// ─────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────
let step        = 0;
let score       = 0;
let allResults  = [];
let studentData = {};
let sessionId   = '';
let rowNum      = null;
let submitted   = false;

// ─────────────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────────────
function startQuiz() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom    = document.getElementById('f-nom').value.trim();
  const groupe = document.getElementById('f-groupe').value;
  const errEl  = document.getElementById('auth-error');
  if (!prenom || !nom || !groupe) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  studentData = { prenom, nom, groupe };
  sessionId   = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display  = 'block';
  sendInit();
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') startQuiz();
});

// ─────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────
function render() {
  submitted = false;
  const q   = QUESTIONS[step];
  document.getElementById('q-num').textContent      = step + 1;
  document.getElementById('score-display').textContent = score;
  document.getElementById('prog-fill').style.width  = ((step + 1) / QUESTIONS.length * 100) + '%';

  const badgeClass = q.section === 'coord'
    ? 'badge-coord'
    : 'badge-phrase';
  const badgeLabel = q.section === 'coord'
    ? 'Coordination &amp; Juxtaposition'
    : 'Types &amp; Formes de phrases';

  const phraseHTML = q.phrase
    ? `<div class="q-phrase">${q.phrase}</div>`
    : '';

  const optsHTML = q.opts.map((o, i) => `
    <input class="mcq-option" type="radio" name="mcq" id="opt${i}" value="${i}">
    <label class="mcq-opt-label" for="opt${i}">
      <span class="opt-letter">${String.fromCharCode(65 + i)})</span>${o}
    </label>
  `).join('');

  const area = document.getElementById('q-area');
  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="section-badge ${badgeClass}">${badgeLabel}</span>
        <span class="q-counter">${step + 1} / ${QUESTIONS.length}</span>
      </div>
      ${phraseHTML}
      <p class="q-text">${q.q}</p>
      <div class="mcq-options">${optsHTML}</div>
      <button class="validate-btn" id="validate-btn" onclick="validate()" disabled>Valider ma réponse</button>
      <div id="expl-area"></div>
      <button class="next-btn" id="next-btn" onclick="next()">
        ${step < QUESTIONS.length - 1 ? 'Question suivante →' : 'Voir mes résultats →'}
      </button>
    </div>`;

  // Enable validate button on selection
  area.querySelectorAll('input[name="mcq"]').forEach(radio => {
    radio.addEventListener('change', () => {
      document.getElementById('validate-btn').disabled = false;
    });
  });
}

// ─────────────────────────────────────────────────────────────────────
// VALIDATE
// ─────────────────────────────────────────────────────────────────────
function validate() {
  if (submitted) return;
  submitted = true;

  const q        = QUESTIONS[step];
  const selected = document.querySelector('input[name="mcq"]:checked');
  const userAns  = selected ? parseInt(selected.value) : -1;
  const isOk     = userAns === q.ans;

  if (isOk) score++;

  // Style options
  q.opts.forEach((_, i) => {
    const lbl = document.querySelector(`label[for="opt${i}"]`);
    const inp = document.getElementById(`opt${i}`);
    inp.disabled = true;
    if (i === q.ans) {
      if (userAns === i) lbl.classList.add('was-correct');
      else               lbl.classList.add('correct-ans');
    } else if (i === userAns) {
      lbl.classList.add('was-wrong');
    }
  });

  document.getElementById('validate-btn').style.display = 'none';
  document.getElementById('score-display').textContent = score;

  // Explanation
  const icon = isOk ? '✅' : '❌';
  const explArea = document.getElementById('expl-area');
  explArea.innerHTML = `
    <div class="mcq-explanation">
      ${icon} ${isOk
        ? '<strong style="color:var(--success)">Bonne réponse !</strong><br>'
        : `<strong style="color:var(--error)">Bonne réponse :</strong> ${String.fromCharCode(65 + q.ans)}) ${q.opts[q.ans]}<br>`}
      💡 ${q.expl}
    </div>`;

  // Track result
  allResults.push({ q: q.q, userAns, correctAns: q.ans, ok: isOk, section: q.section });

  // Send to Apps Script
  const resultStr = icon + ' ' + (isOk ? '1/1' : '0/1');
  sendQuestion(step + 1, resultStr);

  // Show next button
  document.getElementById('next-btn').classList.add('show');
}

// ─────────────────────────────────────────────────────────────────────
// NEXT
// ─────────────────────────────────────────────────────────────────────
function next() {
  step++;
  if (step >= QUESTIONS.length) showResults();
  else render();
}

// ─────────────────────────────────────────────────────────────────────
// RESULTS
// ─────────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('prog-fill').style.width = '100%';

  const coordResults  = allResults.filter(r => r.section === 'coord');
  const phraseResults = allResults.filter(r => r.section === 'phrase');
  const coordScore    = coordResults.filter(r => r.ok).length;
  const phraseScore   = phraseResults.filter(r => r.ok).length;
  const pct           = Math.round(score / QUESTIONS.length * 100);

  let color, title, quote;
  if      (pct >= 90) { color = '#06d6a0'; title = '🏆 Excellent !';         quote = 'Tu es prêt·e pour l\'examen. Très belle maîtrise des notions !'; }
  else if (pct >= 75) { color = '#2ec4b6'; title = '✅ Très bien !';          quote = 'Bonne maîtrise générale. Revois les quelques points manqués.'; }
  else if (pct >= 60) { color = '#f4a261'; title = '🟠 Bien !';               quote = 'Tu as bien compris les bases. Revois les notions moins bien réussies.'; }
  else if (pct >= 45) { color = '#7c6af7'; title = '🔵 À consolider';         quote = 'Reprends les définitions de coordination et de juxtaposition dans ton cahier.'; }
  else                { color = '#ff4d6d'; title = '📚 À retravailler';       quote = 'Revois attentivement le chapitre sur la coordination dans ton cahier MAG3 !'; }

  const colorPct = p => p >= 80 ? 'var(--success)' : p >= 50 ? '#f4a261' : 'var(--error)';

  const reviewCoord  = coordResults.map((r, i) => `
    <div class="review-item ${r.ok ? 'ri-ok' : 'ri-no'}">
      <span class="ri-q">${r.ok ? '✅' : '❌'} ${r.q}</span>
      <span class="ri-sub">${r.ok ? 'Bonne réponse' : 'Bonne réponse : ' + String.fromCharCode(65 + r.correctAns) + ') ' + QUESTIONS[allResults.indexOf(r)].opts[r.correctAns]}</span>
    </div>`).join('');

  // rebuild index for phrase results  
  const phraseReview = phraseResults.map(r => {
    const qIdx = allResults.indexOf(r);
    return `<div class="review-item ${r.ok ? 'ri-ok' : 'ri-no'}">
      <span class="ri-q">${r.ok ? '✅' : '❌'} ${r.q}</span>
      <span class="ri-sub">${r.ok ? 'Bonne réponse' : 'Bonne réponse : ' + String.fromCharCode(65 + r.correctAns) + ') ' + QUESTIONS[qIdx].opts[r.correctAns]}</span>
    </div>`;
  }).join('');

  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';
  rs.innerHTML = `
    <div class="results-card">
      <p style="text-align:center;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem">
        ${studentData.prenom} ${studentData.nom} · ${studentData.groupe}
      </p>
      <div class="big-score" style="color:${color}">${pct}<span class="denom">%</span></div>
      <p class="result-title" style="color:${color}">${title}</p>
      <p class="score-quote">${quote}</p>

      <div class="section-scores">
        <div class="sscore-card">
          <p class="sscore-label">Coordination &amp; Juxtaposition</p>
          <div class="sscore-val" style="color:${colorPct(Math.round(coordScore/coordResults.length*100))}">${coordScore}/${coordResults.length}</div>
        </div>
        <div class="sscore-card">
          <p class="sscore-label">Types &amp; Formes</p>
          <div class="sscore-val" style="color:${colorPct(Math.round(phraseScore/phraseResults.length*100))}">${phraseScore}/${phraseResults.length}</div>
        </div>
      </div>

      <div class="review-section">
        <h3>Partie 1 · Coordination &amp; Juxtaposition</h3>
        ${reviewCoord}
        <h3 style="margin-top:1.2rem">Partie 2 · Types &amp; Formes de phrases</h3>
        ${phraseReview}
      </div>

      <div id="sending-status"></div>
      <a class="home-btn" href="index.html">← Retour aux exercices</a>
    </div>`;

  sendFinal(pct, coordScore, phraseScore);
}

// ─────────────────────────────────────────────────────────────────────
// APPS SCRIPT — envoi temps réel
// ─────────────────────────────────────────────────────────────────────
async function apiFetch(payload) {
  const resp = await fetch(APPS_SCRIPT_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body:    JSON.stringify(payload)
  });
  return resp.json();
}

async function sendInit() {
  try {
    const data = await apiFetch({
      action: 'init', feuille: 'exercice4',
      sessionId, prenom: studentData.prenom,
      nom: studentData.nom, groupe: studentData.groupe
    });
    if (data && data.rowNum) rowNum = data.rowNum;
  } catch (e) { console.error('sendInit:', e); }
}

async function sendQuestion(qNum, result) {
  if (!rowNum) { await sendInit(); if (!rowNum) return; }
  try {
    await apiFetch({
      action: 'question', feuille: 'exercice4',
      rowNum, sessionId, questionNum: qNum,
      result, score_pct: Math.round(score / step * 100) || 0
    });
  } catch (e) { console.error('sendQuestion:', e); }
}

async function sendFinal(pct, coordScore, phraseScore) {
  const statusEl = document.getElementById('sending-status');
  if (statusEl) {
    statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(244,162,97,.1);border:1px solid rgba(244,162,97,.3);color:#ffd4aa;';
    statusEl.textContent = '⏳ Finalisation des résultats…';
  }
  if (!rowNum) { await sendInit(); }
  try {
    const res = await apiFetch({
      action:       'final', feuille: 'exercice4',
      rowNum, sessionId,
      score_pct:    pct,
      score_brut:   score + '/' + QUESTIONS.length,
      coord_score:  coordScore + '/12',
      phrase_score: phraseScore + '/8',
      details:      allResults.map((r, i) => (r.ok ? '✅' : '❌')).join(' ')
    });
    if (!res || res.status !== 'ok') throw new Error((res && res.message) || 'Réponse invalide');
    if (statusEl) {
      statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.3);color:#a0f5e0;';
      statusEl.textContent = '✅ Résultats envoyés à ton enseignant·e !';
    }
  } catch (e) {
    console.error('sendFinal:', e);
    if (statusEl) {
      statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:#ffb4c2;';
      statusEl.textContent = "❌ Échec de l'envoi. Vérifie ta connexion.";
    }
  }
}
</script>
