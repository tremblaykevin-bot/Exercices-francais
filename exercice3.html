<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercice 3 — Types & Formes de phrases</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e17;--card:#1a1828;--accent1:#ff6b35;--accent2:#7c6af7;--accent3:#2ec4b6;
  --text:#fffffe;--muted:#a7a9be;--success:#2ec4b6;--error:#ff4d6d;--border:#2a2840;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  padding:2rem 1rem;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(124,106,247,.12) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 80%,rgba(255,107,53,.1) 0%,transparent 60%)}
header{text-align:center;margin-bottom:2rem}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-family:'Syne',sans-serif;
  font-size:.8rem;font-weight:700;color:var(--muted);text-decoration:none;margin-bottom:1.2rem;transition:color .2s}
.back-link:hover{color:var(--accent2)}
header h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
header p{color:var(--muted);margin-top:.5rem;font-size:.95rem}
.container{max-width:720px;margin:0 auto}

/* AUTH */
.auth-screen{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;
  animation:slideIn .4s ease;position:relative;overflow:hidden}
.auth-screen::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent2),var(--accent1))}
.auth-screen h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.4rem}
.auth-screen>p{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.field-group{margin-bottom:1.2rem}
.field-group label{display:block;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem}
.field-group input,.field-group select{width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid var(--border);border-radius:10px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:1rem;padding:.75rem 1rem;transition:border-color .2s}
.field-group input:focus,.field-group select:focus{outline:none;border-color:var(--accent2)}
.field-group select option{background:#1a1828}
.btn{width:100%;padding:.9rem;border:none;border-radius:12px;font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent1));color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,106,247,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-next{background:rgba(124,106,247,.15);border:1.5px solid rgba(124,106,247,.4);
  color:var(--accent2);margin-top:1rem}
.btn-next:hover{background:rgba(124,106,247,.25)}

/* PROGRESS */
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:99px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent1));transition:width .4s ease}
.section-badge{display:inline-block;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;padding:.25rem .75rem;border-radius:99px;margin-bottom:1rem}
.badge-p1{background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);color:var(--accent2)}
.badge-p2{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);color:var(--accent1)}
.q-counter{font-family:'Syne',sans-serif;font-size:.82rem;color:var(--muted);float:right;margin-bottom:.5rem}

/* QUESTION CARD */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;
  animation:slideIn .35s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* PHRASE display */
.phrase-box{background:rgba(124,106,247,.08);border:1.5px solid rgba(124,106,247,.25);
  border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:1.6rem;font-size:1.05rem;
  font-style:italic;line-height:1.5;color:var(--text)}

/* FORM SELECTORS */
.form-group{margin-bottom:1.1rem}
.form-group-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem;display:block}
.radio-row{display:flex;flex-wrap:wrap;gap:.5rem}
.radio-row input[type=radio]{display:none}
.radio-row label{padding:.45rem 1rem;border-radius:8px;border:1.5px solid var(--border);
  background:rgba(255,255,255,.03);font-size:.9rem;cursor:pointer;transition:all .2s;user-select:none}
.radio-row input[type=radio]:checked + label{background:rgba(124,106,247,.2);
  border-color:var(--accent2);color:var(--accent2);font-weight:700}
.radio-row label:hover{border-color:rgba(124,106,247,.4);background:rgba(124,106,247,.08)}

/* After submit feedback */
.feedback-row{display:flex;align-items:flex-start;gap:.6rem;font-size:.85rem;
  margin-top:.4rem;padding:.5rem .7rem;border-radius:8px;animation:slideIn .25s ease}
.feedback-ok{background:rgba(46,196,182,.1);border:1px solid rgba(46,196,182,.25);color:var(--success)}
.feedback-err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.25);color:var(--error)}
.feedback-icon{flex-shrink:0;font-size:1rem}
.feedback-txt{line-height:1.4}

/* After submit, color radio labels */
.radio-row label.was-correct{background:rgba(46,196,182,.15)!important;border-color:var(--success)!important;color:var(--success)!important}
.radio-row label.was-wrong{background:rgba(255,77,109,.12)!important;border-color:var(--error)!important;color:var(--error)!important}
.radio-row label.correct-answer{border-color:var(--success)!important;color:var(--success)!important;border-style:dashed!important}

/* MCQ */
.mcq-question{font-size:1.05rem;line-height:1.5;margin-bottom:1.4rem;font-weight:500}
.mcq-options{display:flex;flex-direction:column;gap:.6rem}
.mcq-options input[type=radio]{display:none}
.mcq-opt-label{display:flex;align-items:flex-start;gap:.75rem;padding:.8rem 1rem;
  border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4}
.mcq-opt-label:hover{border-color:rgba(124,106,247,.4);background:rgba(124,106,247,.06)}
.mcq-options input[type=radio]:checked + .mcq-opt-label{background:rgba(124,106,247,.15);
  border-color:var(--accent2);color:var(--accent2);font-weight:600}
.opt-letter{font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
  width:22px;flex-shrink:0;padding-top:.05rem}
.mcq-opt-label.was-correct{background:rgba(46,196,182,.12)!important;border-color:var(--success)!important;color:var(--success)!important}
.mcq-opt-label.was-wrong{background:rgba(255,77,109,.1)!important;border-color:var(--error)!important;color:var(--error)!important}
.mcq-opt-label.correct-answer{border-color:var(--success)!important;color:var(--success)!important;border-style:dashed!important}
.mcq-explanation{margin-top:.9rem;padding:.75rem 1rem;background:rgba(255,255,255,.04);
  border-left:3px solid var(--accent3);border-radius:0 8px 8px 0;font-size:.87rem;
  color:var(--muted);line-height:1.5;animation:slideIn .3s ease}

/* RESULTS */
.results-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:2rem;animation:slideIn .4s ease}
.big-score{font-family:'Syne',sans-serif;font-size:4rem;font-weight:800;line-height:1;text-align:center}
.big-score .denom{font-size:2rem;color:var(--muted)}
.result-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;text-align:center;margin:.5rem 0}
.score-quote{color:var(--muted);font-style:italic;text-align:center;font-size:.9rem;margin-bottom:1.5rem}
.section-scores{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.sscore-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;
  padding:1rem;text-align:center}
.sscore-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.4rem}
.sscore-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.5rem}
@media(max-width:500px){.cat-grid{grid-template-columns:repeat(2,1fr)}.section-scores{grid-template-columns:1fr}}
.cat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:.7rem;text-align:center}
.cat-label{font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:.25rem}
.cat-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
.review-section{margin-top:1.5rem}
.review-section h3{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.75rem}
.review-item{background:rgba(255,255,255,.03);border-radius:10px;padding:.8rem 1rem;
  margin-bottom:.5rem;font-size:.85rem;border:1px solid var(--border)}
.ri-phrase{display:block;font-style:italic;margin-bottom:.3rem;color:var(--text)}
.ri-sub{color:var(--muted);font-size:.78rem}
.ri-ok{border-color:rgba(46,196,182,.3)}
.ri-par{border-color:rgba(255,107,53,.3)}
.ri-no{border-color:rgba(255,77,109,.3)}
.home-btn{display:block;text-align:center;margin-top:1rem;padding:.75rem;border-radius:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
  text-decoration:none;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
  transition:all .2s}
.home-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#sending-status{display:none}
</style>
</head>
<body>
<header>
  <a class="back-link" href="index.html">← Retour aux exercices</a>
  <h1>Exercice 3</h1>
  <p>Types et formes de phrases · Théorie appliquée</p>
</header>

<div class="container">

  <!-- AUTH -->
  <div class="auth-screen" id="auth-screen">
    <h2>Identification</h2>
    <p>Entre tes informations avant de commencer l'exercice.</p>
    <div class="field-group"><label>Prénom</label><input type="text" id="f-prenom" placeholder="Ton prénom"></div>
    <div class="field-group"><label>Nom</label><input type="text" id="f-nom" placeholder="Ton nom de famille"></div>
    <div class="field-group"><label>Groupe</label>
      <select id="f-groupe">
        <option value="">— Choisis ton groupe —</option>
        <option>Groupe 31</option><option>Groupe 32</option><option>Groupe 33</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Commencer l'exercice →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="q-area"></div>
  </div>

  <!-- RESULTS -->
  <div id="results-screen" style="display:none"></div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4hmq5LZvspDdvS9myff8iKh8s2xh-9jcZChyu2q7aZ9LjrW9pxBTOcgduENqOitAw/exec";

// ── DATA ─────────────────────────────────────────────────────────

const PHRASES = [
  {
    phrase: "Les joueurs ont placé leurs pièces sur les bonnes cases.",
    type:"Déclaratif", posNeg:"Positive", actPass:"Active", neuEmph:"Neutre", persImpers:"Personnelle",
    hints:{
      type:"La phrase a un sujet («Les joueurs»), un prédicat et se termine par un point. Elle énonce un fait.",
      posNeg:"Aucun marqueur de négation (ne…pas, ne…jamais, etc.) n'est présent.",
      actPass:"Le sujet «Les joueurs» fait l'action de placer — c'est la forme active.",
      neuEmph:"Aucun marqueur emphatique (c'est…qui, c'est…que ou reprise pronominale) n'est présent.",
      persImpers:"Le sujet «Les joueurs» peut être remplacé par le pronom «Ils» → forme personnelle."
    }
  },
  {
    phrase: "Comme il est difficile de gagner à ce jeu!",
    type:"Exclamatif", posNeg:"Positive", actPass:"Active", neuEmph:"Neutre", persImpers:"Impersonnelle",
    hints:{
      type:"Le marqueur exclamatif «Comme» et le point d'exclamation caractérisent ce type.",
      posNeg:"Aucun marqueur de négation — la phrase affirme quelque chose.",
      actPass:"Le sujet grammatical «il» est le sujet de la phrase.",
      neuEmph:"«Comme» est un marqueur exclamatif, non emphatique. Aucun c'est…qui/que.",
      persImpers:"Le pronom «il» est impersonnel — il ne remplace aucun nom. On ne peut pas le remplacer par «ce jeu» en tête de phrase."
    }
  },
  {
    phrase: "Ne montre jamais tes cartes à ton adversaire.",
    type:"Impératif", posNeg:"Négative", actPass:"Active", neuEmph:"Neutre", persImpers:"Personnelle",
    hints:{
      type:"Le verbe «montre» est à l'impératif et le sujet est absent — marqueurs du type impératif.",
      posNeg:"Les marqueurs de négation «ne…jamais» encadrent le verbe.",
      actPass:"L'action est accomplie par la personne désignée (tu implicite) — forme active.",
      neuEmph:"Aucun marqueur emphatique n'est présent.",
      persImpers:"La phrase impérative s'adresse à une personne réelle (tu/vous) — toujours personnelle."
    }
  },
  {
    phrase: "C'est la reine qui est la pièce la plus puissante aux échecs.",
    type:"Déclaratif", posNeg:"Positive", actPass:"Active", neuEmph:"Emphatique", persImpers:"Personnelle",
    hints:{
      type:"La phrase a un sujet, un prédicat et se termine par un point — type déclaratif.",
      posNeg:"Aucun marqueur de négation.",
      actPass:"Forme active standard — le sujet fait l'action.",
      neuEmph:"Le marqueur emphatique «C'est…qui» met «la reine» en évidence.",
      persImpers:"Le sujet logique «la reine» peut être remplacé par «Elle» → forme personnelle."
    }
  },
  {
    phrase: "Les tournois n'ont pas été organisés par les élèves.",
    type:"Déclaratif", posNeg:"Négative", actPass:"Passive", neuEmph:"Neutre", persImpers:"Personnelle",
    hints:{
      type:"Sujet présent («Les tournois»), prédicat, point final — type déclaratif.",
      posNeg:"Les marqueurs de négation «ne…pas» sont présents.",
      actPass:"«ont été organisés par» = auxiliaire être + participe passé. Le sujet subit l'action — forme passive.",
      neuEmph:"Aucun marqueur emphatique (c'est…qui/que ou reprise pronominale).",
      persImpers:"Le sujet «Les tournois» peut être remplacé par «Ils» → forme personnelle."
    }
  },
  {
    phrase: "Il existe plusieurs stratégies pour remporter la partie.",
    type:"Déclaratif", posNeg:"Positive", actPass:"Active", neuEmph:"Neutre", persImpers:"Impersonnelle",
    hints:{
      type:"Sujet, prédicat, point final — type déclaratif.",
      posNeg:"Aucun marqueur de négation.",
      actPass:"Forme active standard.",
      neuEmph:"Aucun marqueur emphatique.",
      persImpers:"Le pronom «il» est impersonnel — le vrai sujet logique est «plusieurs stratégies». On ne peut pas remplacer «il» par un autre pronom."
    }
  },
  {
    phrase: "Que de beaux coups tu as joués!",
    type:"Exclamatif", posNeg:"Positive", actPass:"Active", neuEmph:"Neutre", persImpers:"Personnelle",
    hints:{
      type:"Le marqueur exclamatif «Que de» et le point d'exclamation caractérisent ce type.",
      posNeg:"Aucun marqueur de négation.",
      actPass:"Le sujet «tu» fait l'action de jouer — forme active.",
      neuEmph:"«Que de» est un marqueur exclamatif, non emphatique. Pas de c'est…qui/que.",
      persImpers:"Le sujet «tu» renvoie à une personne réelle → forme personnelle."
    }
  },
  {
    phrase: "Ce très beau coup n'a-t-il pas été remarqué par tous les joueurs?",
    type:"Interrogatif", posNeg:"Négative", actPass:"Passive", neuEmph:"Neutre", persImpers:"Personnelle",
    hints:{
      type:"L'inversion «a-t-il» et le point d'interrogation caractérisent le type interrogatif.",
      posNeg:"Les marqueurs de négation «ne…pas» sont présents.",
      actPass:"«a été remarqué par» = auxiliaire être + participe passé — forme passive.",
      neuEmph:"Aucun marqueur emphatique (c'est…qui/que ou reprise pronominale).",
      persImpers:"Le sujet «Ce très beau coup» peut être remplacé par «Il» → forme personnelle."
    }
  },
  {
    phrase: "Il ne faut jamais abandonner une partie avant la fin.",
    type:"Déclaratif", posNeg:"Négative", actPass:"Active", neuEmph:"Neutre", persImpers:"Impersonnelle",
    hints:{
      type:"Sujet présent, prédicat, point final — type déclaratif.",
      posNeg:"Les marqueurs de négation «ne…jamais» sont présents.",
      actPass:"Forme active — aucune transformation passive.",
      neuEmph:"Aucun marqueur emphatique.",
      persImpers:"Le verbe «falloir» est toujours impersonnel. Le pronom «il» ne peut être remplacé par aucun nom."
    }
  },
  {
    phrase: "La nouvelle console, mon frère la lui a offerte pour son anniversaire.",
    type:"Déclaratif", posNeg:"Positive", actPass:"Active", neuEmph:"Emphatique", persImpers:"Personnelle",
    hints:{
      type:"Sujet «mon frère», prédicat, point final — type déclaratif.",
      posNeg:"Aucun marqueur de négation.",
      actPass:"Le sujet «mon frère» fait l'action d'offrir — forme active.",
      neuEmph:"Reprise du GN «la nouvelle console» par le pronom «la» — c'est un marqueur emphatique.",
      persImpers:"Le sujet «mon frère» peut être remplacé par «Il» → forme personnelle."
    }
  }
];

const MCQ = [
  {
    q:"Quel marqueur caractérise une phrase de TYPE EXCLAMATIF?",
    opts:["Un point d'interrogation à la fin","Un marqueur exclamatif (Comme, Que, Quel…) et un point d'exclamation","Un verbe conjugué à l'impératif sans sujet","La présence du pronom impersonnel il"],
    ans:1,
    expl:"La phrase exclamative se reconnaît à la présence d'un marqueur exclamatif (Comme, Que de, Quel, etc.) et se termine obligatoirement par un point d'exclamation (!)."
  },
  {
    q:"Laquelle de ces phrases est de FORME PASSIVE?",
    opts:["Mon frère aime les jeux de société.","Personne ne comprend ces règles.","Les règles ont été expliquées par l'arbitre.","C'est lui qui explique les règles."],
    ans:2,
    expl:"La forme passive se reconnaît à l'auxiliaire «être» suivi du participe passé. Ici, «ont été expliquées par» = auxiliaire être au passé composé + participe passé du verbe expliquer."
  },
  {
    q:"Quelle phrase est de FORME EMPHATIQUE?",
    opts:["Mon amie gagne toujours aux cartes.","Mon amie ne gagne jamais aux cartes.","C'est mon amie qui gagne toujours aux cartes.","Mon amie a-t-elle gagné aux cartes?"],
    ans:2,
    expl:"La forme emphatique se reconnaît à la présence d'un marqueur emphatique (c'est…qui, c'est…que) ou d'une reprise d'un GN par un pronom. «C'est…qui» met «mon amie» en évidence."
  },
  {
    q:"Dans quelle phrase le pronom «il» est-il IMPERSONNEL?",
    opts:["Il joue aux échecs depuis dix ans.","Il a remporté le tournoi régional.","Il manque deux pièces dans la boîte.","Il aime ce nouveau jeu de stratégie."],
    ans:2,
    expl:"Dans «Il manque deux pièces», «il» est impersonnel — le vrai sujet logique est «deux pièces». Dans les autres phrases, «il» remplace une personne réelle et peut être remplacé par un nom."
  },
  {
    q:"Laquelle de ces constructions est une ERREUR dans une phrase interrogative à l'écrit?",
    opts:["Aime-t-elle les jeux de stratégie?","Est-ce qu'elle aime les jeux de stratégie?","Elle aime-tu les jeux de stratégie?","Quelle stratégie préfère-t-elle?"],
    ans:2,
    expl:"L'ajout d'un «tu» superflu après le verbe est une erreur fréquente à l'écrit. La forme correcte utilise l'inversion (Aime-t-elle?) ou l'ajout de est-ce que."
  },
  {
    q:"Pour transformer «Tu lances les dés en premier» en phrase de type IMPÉRATIF, on obtient:",
    opts:["Tu lanceras les dés en premier?","Lance les dés en premier.","Les dés, tu les lances en premier.","Comme tu lances bien les dés!"],
    ans:1,
    expl:"Pour former l'impératif à partir d'une phrase de base, on remplace le verbe par sa forme impérative et on efface le sujet. On met un point ou un point d'exclamation."
  },
  {
    q:"Quelle phrase correspond au MODÈLE DE LA PHRASE DE BASE?",
    opts:["Il ne faut pas tricher au jeu.","C'est toi qui as triché!","Cette joueuse respecte toutes les règles du jeu.","Les règles ont-elles été respectées par tous?"],
    ans:2,
    expl:"La phrase de base est de type déclaratif, de formes positive, active, neutre et personnelle. Seule «Cette joueuse respecte toutes les règles du jeu» remplit ces quatre conditions."
  },
  {
    q:"Que se passe-t-il lorsqu'on transforme une phrase ACTIVE en phrase PASSIVE?",
    opts:["On efface le sujet de la phrase active.","On ajoute un marqueur de négation au verbe.","Le complément direct du verbe devient le nouveau sujet.","On place le verbe à l'impératif."],
    ans:2,
    expl:"Dans la transformation active → passive, le CD du verbe devient le sujet de la phrase passive. Le sujet de la phrase active devient le complément de l'adjectif participe, introduit par «par» ou «de»."
  },
  {
    q:"Parmi ces marqueurs, lequel est un marqueur EMPHATIQUE?",
    opts:["ne… pas","Comme / Que de","est-ce que","C'est… qui"],
    ans:3,
    expl:"«C'est…qui» et «c'est…que» sont des marqueurs emphatiques. «ne…pas» = négation; «Comme / Que de» = exclamation; «est-ce que» = interrogation."
  },
  {
    q:"Laquelle de ces phrases est DÉCLARATIVE, NÉGATIVE, PASSIVE et PERSONNELLE?",
    opts:["Ne jouez jamais sans lire les règles.","Il n'existe aucune règle pour ce jeu.","Le gagnant n'a pas été annoncé par l'arbitre.","C'est la règle qui n'a pas été respectée."],
    ans:2,
    expl:"«Le gagnant n'a pas été annoncé par l'arbitre» est: déclaratif (sujet + point), négatif (ne…pas), passif (a été annoncé par) et personnel (le sujet «le gagnant» → il). Les autres ont d'autres formes: impératif, impersonnel ou emphatique."
  }
];

// ── STATE ─────────────────────────────────────────────────────────
let step = 0;          // 0-9 = phrases, 10-19 = MCQ
let submitted = false;
let allResults = [];   // {type, correct, details} per question
let studentData = {};
const TOTAL = PHRASES.length + MCQ.length; // 20

// Category tracking for phrases
let catScores = {type:0,posNeg:0,actPass:0,neuEmph:0,persImpers:0};
let catTotals = {type:0,posNeg:0,actPass:0,neuEmph:0,persImpers:0};

// ── AUTH ──────────────────────────────────────────────────────────
function startQuiz() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom    = document.getElementById('f-nom').value.trim();
  const groupe = document.getElementById('f-groupe').value;
  if (!prenom || !nom || !groupe) { alert('Complète tous les champs !'); return; }
  studentData = {prenom, nom, groupe};
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  submitted = false;
  updateProgress();
  const area = document.getElementById('q-area');

  if (step < PHRASES.length) {
    renderPhrase(area, step);
  } else {
    renderMCQ(area, step - PHRASES.length);
  }
}

function updateProgress() {
  const pct = Math.round(step / TOTAL * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderPhrase(area, idx) {
  const p = PHRASES[idx];
  area.innerHTML = `
    <div class="q-card">
      <span class="section-badge badge-p1">Partie 1 · Identification</span>
      <span class="q-counter">Phrase ${idx+1} / ${PHRASES.length}</span>
      <div style="clear:both;margin-bottom:.8rem"></div>
      <p style="font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">Identifie le type et les 4 formes de cette phrase :</p>
      <div class="phrase-box">${p.phrase}</div>

      ${formGroup('TYPE DE PHRASE','type',['Déclaratif','Exclamatif','Impératif','Interrogatif'])}
      ${formGroup('FORME 1 — Positive ou négative?','posNeg',['Positive','Négative'])}
      ${formGroup('FORME 2 — Active ou passive?','actPass',['Active','Passive'])}
      ${formGroup('FORME 3 — Neutre ou emphatique?','neuEmph',['Neutre','Emphatique'])}
      ${formGroup('FORME 4 — Personnelle ou impersonnelle?','persImpers',['Personnelle','Impersonnelle'])}

      <div id="feedback-area" style="margin-top:1rem"></div>
      <button class="btn btn-primary" id="btn-valider" onclick="validatePhrase(${idx})" style="margin-top:1.2rem">✓ Valider</button>
      <button class="btn btn-next" id="btn-next" style="display:none" onclick="nextStep()">Question suivante →</button>
    </div>`;
}

function formGroup(labelText, name, options) {
  const radios = options.map((opt,i) => `
    <input type="radio" name="${name}" id="${name}-${i}" value="${opt}">
    <label for="${name}-${i}">${opt}</label>`).join('');
  return `<div class="form-group" id="fg-${name}">
    <span class="form-group-label">${labelText}</span>
    <div class="radio-row" id="rr-${name}">${radios}</div>
    <div id="fb-${name}"></div>
  </div>`;
}

function renderMCQ(area, idx) {
  const q = MCQ[idx];
  const opts = q.opts.map((opt,i) => `
    <input type="radio" name="mcq" id="mcq-${i}" value="${i}">
    <label class="mcq-opt-label" for="mcq-${i}">
      <span class="opt-letter">${String.fromCharCode(65+i)})</span>
      <span>${opt}</span>
    </label>`).join('');

  area.innerHTML = `
    <div class="q-card">
      <span class="section-badge badge-p2">Partie 2 · Théorie</span>
      <span class="q-counter">Question ${idx+1} / ${MCQ.length}</span>
      <div style="clear:both;margin-bottom:1rem"></div>
      <p class="mcq-question">${q.q}</p>
      <div class="mcq-options" id="mcq-opts">${opts}</div>
      <div id="mcq-expl"></div>
      <button class="btn btn-primary" id="btn-valider" onclick="validateMCQ(${idx})" style="margin-top:1.2rem">✓ Valider</button>
      <button class="btn btn-next" id="btn-next" style="display:none" onclick="nextStep()">
        ${step === TOTAL - 1 ? 'Voir mes résultats →' : 'Question suivante →'}
      </button>
    </div>`;
}

// ── VALIDATE PHRASE ───────────────────────────────────────────────
function validatePhrase(idx) {
  if (submitted) return;
  const p = PHRASES[idx];
  const fields = ['type','posNeg','actPass','neuEmph','persImpers'];
  const correct = {type:p.type,posNeg:p.posNeg,actPass:p.actPass,neuEmph:p.neuEmph,persImpers:p.persImpers};
  const fieldLabels = {type:'Type',posNeg:'Positive/Négative',actPass:'Active/Passive',neuEmph:'Neutre/Emphatique',persImpers:'Personnelle/Impersonnelle'};

  let given = {};
  for (const f of fields) {
    const sel = document.querySelector(`input[name="${f}"]:checked`);
    if (!sel) { alert('Réponds à toutes les questions avant de valider !'); return; }
    given[f] = sel.value;
  }

  submitted = true;
  let correct_count = 0;
  const fbArea = document.getElementById('feedback-area');
  let fbHTML = '';

  for (const f of fields) {
    const isOk = given[f] === correct[f];
    if (isOk) correct_count++;

    // Color the radio labels
    const row = document.getElementById('rr-' + f);
    row.querySelectorAll('input[type=radio]').forEach(inp => {
      const lbl = inp.nextElementSibling;
      inp.disabled = true;
      if (inp.value === correct[f] && inp.value === given[f]) lbl.className += ' was-correct';
      else if (inp.value === given[f] && inp.value !== correct[f]) lbl.className += ' was-wrong';
      else if (inp.value === correct[f]) lbl.className += ' correct-answer';
    });

    const icon = isOk ? '✅' : '❌';
    const cls  = isOk ? 'feedback-ok' : 'feedback-err';
    const msg  = isOk
      ? `<strong>${fieldLabels[f]} :</strong> ${p.hints[f]}`
      : `<strong>${fieldLabels[f]} :</strong> La bonne réponse est <strong>${correct[f]}</strong>. ${p.hints[f]}`;
    fbHTML += `<div class="feedback-row ${cls}"><span class="feedback-icon">${icon}</span><span class="feedback-txt">${msg}</span></div>`;

    // Category tracking
    catTotals[f]++;
    if (isOk) catScores[f]++;
  }

  fbArea.innerHTML = fbHTML;

  // Track result
  const phraseResult = `${['❌','⚠️','⚠️','⚠️','🟡'][correct_count] || '✅'} ${correct_count}/5`;
  const finalIcon = correct_count === 5 ? '✅' : correct_count >= 3 ? '⚠️' : '❌';
  allResults.push({
    section:'phrase', idx, given, correct, correct_count, icon: finalIcon,
    label: `P${idx+1}: ${p.phrase.substring(0,40)}…`,
    result: `${finalIcon} ${correct_count}/5`
  });

  document.getElementById('btn-valider').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
}

// ── VALIDATE MCQ ──────────────────────────────────────────────────
function validateMCQ(idx) {
  if (submitted) return;
  const q = MCQ[idx];
  const sel = document.querySelector('input[name="mcq"]:checked');
  if (!sel) { alert('Choisis une réponse avant de valider !'); return; }

  submitted = true;
  const given = parseInt(sel.value);
  const isOk  = given === q.ans;

  document.querySelectorAll('#mcq-opts input[type=radio]').forEach(inp => {
    inp.disabled = true;
    const lbl = inp.nextElementSibling;
    const val = parseInt(inp.value);
    if (val === q.ans && val === given) lbl.className += ' was-correct';
    else if (val === given && val !== q.ans) lbl.className += ' was-wrong';
    else if (val === q.ans) lbl.className += ' correct-answer';
  });

  document.getElementById('mcq-expl').innerHTML =
    `<div class="mcq-explanation">${isOk ? '✅ ' : '❌ '}<strong>${isOk ? 'Bonne réponse!' : 'Mauvaise réponse.'}</strong> ${q.expl}</div>`;

  allResults.push({
    section:'mcq', idx, given, correct:q.ans, correct_count: isOk?1:0,
    icon: isOk?'✅':'❌',
    label:`Q${idx+1}: ${q.q.substring(0,45)}…`,
    result: isOk?'✅':'❌'
  });

  document.getElementById('btn-valider').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
}

// ── NEXT ──────────────────────────────────────────────────────────
function nextStep() {
  step++;
  if (step >= TOTAL) { showResults(); return; }
  render();
}

// ── RESULTS ───────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';
  document.getElementById('prog-fill').style.width = '100%';

  // Scoring
  const phraseResults = allResults.filter(r => r.section === 'phrase');
  const mcqResults    = allResults.filter(r => r.section === 'mcq');
  const p1pts  = phraseResults.reduce((s,r) => s + r.correct_count, 0);
  const p1max  = PHRASES.length * 5;
  const p2pts  = mcqResults.reduce((s,r)    => s + r.correct_count, 0);
  const p2max  = MCQ.length;
  const total  = p1pts + p2pts;
  const maxPts = p1max + p2max;
  const pct    = Math.round(total / maxPts * 100);

  let color, title, quote;
  if      (pct >= 90) { color='#9b5de5'; title='🏆 Excellent !';    quote='Maîtrise parfaite des types et formes de phrases. Bravo!' }
  else if (pct >= 75) { color='#2ec4b6'; title='✅ Très bien !';     quote='Tu maîtrises bien la matière. Quelques détails à revoir.' }
  else if (pct >= 60) { color='#f77f00'; title='🟠 Bien !';          quote='Bonne compréhension générale. Revois les formes moins bien réussies.' }
  else if (pct >= 45) { color='#457b9d'; title='🔵 À consolider';    quote='Reprends les notions de types et formes dans ton cahier.' }
  else                { color='#e63946'; title='📚 À retravailler';  quote='Consulte ton manuel et reprends l\'exercice !' }

  // Category pcts for phrases
  const catPcts = {};
  for (const k of ['type','posNeg','actPass','neuEmph','persImpers']) {
    catPcts[k] = catTotals[k] > 0 ? Math.round(catScores[k]/catTotals[k]*100) : 0;
  }
  const catColor = pct => pct>=80?'var(--success)':pct>=50?'#f77f00':'var(--error)';

  // Review HTML
  const phraseReview = phraseResults.map(r => {
    const cls = r.correct_count===5?'ri-ok':r.correct_count>=3?'ri-par':'ri-no';
    const wrongs = ['type','posNeg','actPass','neuEmph','persImpers']
      .filter(k => r.given[k] !== r.correct[k])
      .map(k => {
        const labels = {type:'Type',posNeg:'Pos/Nég',actPass:'Act/Pass',neuEmph:'Neutre/Emph',persImpers:'Pers/Impers'};
        return `<span style="display:inline-block;margin-right:.6rem">• ${labels[k]}: <span style="color:var(--success)">${r.correct[k]}</span></span>`;
      }).join('');
    return `<div class="review-item ${cls}">
      <span class="ri-phrase">${r.icon} ${PHRASES[r.idx].phrase}</span>
      <span class="ri-sub">${r.correct_count}/5 correctes${wrongs ? ' · Erreurs: '+wrongs : ''}</span>
    </div>`;
  }).join('');

  const mcqReview = mcqResults.map(r => {
    const cls = r.correct_count===1?'ri-ok':'ri-no';
    return `<div class="review-item ${cls}">
      <span class="ri-phrase">${r.icon} ${MCQ[r.idx].q}</span>
      <span class="ri-sub">${r.correct_count===1?'Bonne réponse':'Bonne réponse: '+String.fromCharCode(65+MCQ[r.idx].ans)+') '+MCQ[r.idx].opts[MCQ[r.idx].ans]}</span>
    </div>`;
  }).join('');

  rs.innerHTML = `
    <div class="results-card">
      <p style="text-align:center;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem">
        ${studentData.prenom} ${studentData.nom} · ${studentData.groupe}
      </p>
      <div class="big-score" style="color:${color}">${pct}<span class="denom">%</span></div>
      <p class="result-title" style="color:${color}">${title}</p>
      <p class="score-quote">${quote}</p>

      <div class="section-scores">
        <div class="sscore-card">
          <p class="sscore-label">Partie 1 · Phrases</p>
          <div class="sscore-val" style="color:${catColor(Math.round(p1pts/p1max*100))}">${p1pts}/${p1max}</div>
        </div>
        <div class="sscore-card">
          <p class="sscore-label">Partie 2 · Théorie</p>
          <div class="sscore-val" style="color:${catColor(Math.round(p2pts/p2max*100))}">${p2pts}/${p2max}</div>
        </div>
      </div>

      <p style="font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.6rem">Résultats par catégorie</p>
      <div class="cat-grid">
        ${[
          ['Type','type'],['Pos/Nég','posNeg'],['Act/Pass','actPass'],
          ['Neutre/Emph','neuEmph'],['Pers/Impers','persImpers']
        ].map(([lbl,k]) => `<div class="cat-card">
          <p class="cat-label">${lbl}</p>
          <div class="cat-val" style="color:${catColor(catPcts[k])}">${catScores[k]}/${catTotals[k]}</div>
        </div>`).join('')}
      </div>

      <div class="review-section">
        <h3>Partie 1 · Identification des phrases</h3>
        ${phraseReview}
        <h3 style="margin-top:1.2rem">Partie 2 · Questions théoriques</h3>
        ${mcqReview}
      </div>

      <div id="sending-status">⏳ Envoi en cours…</div>
      <a class="home-btn" href="index.html">← Retour aux exercices</a>
    </div>`;

  sendResults(pct, p1pts, p2pts);
}

// ── SEND TO SHEETS ────────────────────────────────────────────────
async function sendResults(pct, p1pts, p2pts) {
  const statusEl = document.getElementById('sending-status');
  if (statusEl) {
    statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.3);color:#c8c0ff;';
    statusEl.textContent = '⏳ Envoi des résultats…';
  }

  const phraseResults = allResults.filter(r => r.section === 'phrase');
  const mcqResults    = allResults.filter(r => r.section === 'mcq');

  const catPcts = {};
  for (const k of ['type','posNeg','actPass','neuEmph','persImpers']) {
    catPcts[k] = catTotals[k] > 0 ? Math.round(catScores[k]/catTotals[k]*100) + '%' : '0%';
  }

  const payload = {
    feuille:      "exercice3",
    prenom:       studentData.prenom,
    nom:          studentData.nom,
    groupe:       studentData.groupe,
    score_pct:    pct,
    score_p1:     p1pts + "/" + (PHRASES.length*5),
    score_p2:     p2pts + "/" + MCQ.length,
    type_pct:     catPcts.type,
    posneg_pct:   catPcts.posNeg,
    actpass_pct:  catPcts.actPass,
    neuemph_pct:  catPcts.neuEmph,
    persimpers_pct: catPcts.persImpers,
    phrases: phraseResults.map(r => r.result).join(", "),
    mcq:     mcqResults.map(r => r.result).join(", ")
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    });
    if (statusEl) {
      statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(42,157,143,.12);border:1px solid rgba(42,157,143,.3);color:#7ee8a2;';
      statusEl.textContent = '✅ Résultats envoyés à ton enseignant·e !';
    }
  } catch(err) {
    if (statusEl) {
      statusEl.style.cssText = 'display:block;margin-top:1rem;padding:.8rem 1rem;border-radius:8px;font-size:.9rem;font-weight:600;background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#ffb3b3;';
      statusEl.textContent = '❌ Erreur réseau — préviens ton enseignant·e.';
    }
  }
}
</script>
